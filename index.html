    <style>
        body {
            font-family: 'Noto Sans Thai', sans-serif;
            touch-action: manipulation;
        }

        .fade-in {
            animation: fadeIn 0.4s ease-out;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* ตกแต่งส่วนที่เป็น Progress ให้ดูสมูท */
        .progress-bar {
            transition: height 1s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* Animation สำหรับ Active Task */
        .active-task-pulse {
            animation: borderPulse 2s infinite;
        }

        @keyframes borderPulse {
            0% {
                border-color: #3b82f6;
                box-shadow: 0 0 0 0 rgba(59, 130, 246, 0.4);
            }

            70% {
                border-color: #60a5fa;
                box-shadow: 0 0 0 6px rgba(59, 130, 246, 0);
            }

            100% {
                border-color: #3b82f6;
                box-shadow: 0 0 0 0 rgba(59, 130, 246, 0);
            }
        }

        /* --- Custom Responsive Logic for Calendar (iPhone/Small Screen < 540px) --- */
        /* Default (Mobile First): ถ้ามีคลาส has-emoji */
        .cell-content.has-emoji .date-number {
            display: none;
            /* ซ่อนเลขวันที่บนมือถือถ้ามี emoji */
        }

        .cell-content.has-emoji .emoji-wrapper {
            position: static;
            /* ให้อยู่ใน flow ปกติ (ตรงกลาง) */
            font-size: 1.75rem;
            /* ขยายขนาด emoji */
            line-height: 1;
        }

        /* Desktop/Tablet (Width >= 540px) */
        @media (min-width: 540px) {
            .cell-content.has-emoji .date-number {
                display: block !important;
                /* กลับมาแสดงเลขวันที่ */
            }

            .cell-content.has-emoji .emoji-wrapper {
                position: absolute;
                /* กลับไปลอยมุมขวาบน */
                top: 0.25rem;
                right: 0.25rem;
                font-size: 1.125rem;
                /* ขนาดปกติ */
            }
        }

        function getCycleLength() {
            let max = 0;
            scheduleData.forEach(p => p.days.forEach(d => { if (d > max) max = d; }));
            return max || 1;
        }

        function getCycleDay(dateObj) {
            const start = new Date(startDateStr);
            start.setHours(0, 0, 0, 0);
            const target = new Date(dateObj);
            target.setHours(0, 0, 0, 0);

            const diffTime = target.getTime() - start.getTime();
            const diffDays = Math.floor(diffTime / (1000 * 60 * 60 * 24));
            const cycleLen = getCycleLength();

            return ((diffDays % cycleLen + cycleLen) % cycleLen) + 1;
        }

        function getIcon(name) {
            // Map custom names to Feather Icons for consistency
            const map = {
                'Dumbbell': 'activity',      // Legacy

                'Bath': 'droplet',           // Legacy
                'MapPin': 'truck',           // Changed from 'map-pin'
                'Ghost': 'wind',             // Changed from non-existent
                'Work': 'briefcase'
            };

            const key = (map[name] || name || 'sun').toLowerCase();

            if (typeof feather !== 'undefined' && feather.icons[key]) {
                // REMOVED: Heart special case for color consistency
                return feather.icons[key].toSvg({
                    width: 20,
                    height: 20,
                    'stroke-width': 2.5
                });
            }
            // Fallback
            return feather && feather.icons['sun'] ? feather.icons['sun'].toSvg({ width: 20, height: 20, 'stroke-width': 2.5 }) : '';
        }

        // --- HOLIDAYS API FETCHING (MyHora + CORS Proxy) ---
        async function fetchThaiHolidays() {
            holidayApiStatus = 'Loading';
            renderEditor(document.getElementById('app-content'));

            try {
                // แก้ปัญหา CORS โดยใช้ allorigins Proxy
                const targetUrl = 'https://www.myhora.com/calendar/ical/holiday.aspx?latest.json';
                const proxyUrl = 'https://corsproxy.io/?';

                const response = await fetch(proxyUrl + encodeURIComponent(targetUrl));
                if (response.ok) {
                    let rawText = await response.text();

                    // แก้ไขปัญหาโครงสร้าง JSON จาก MyHora ที่ไม่มีเครื่องหมายลูกน้ำ (comma) คั่นระหว่าง Object ใน VEVENT array
                    // เปลี่ยนจาก }{ เป็น },{
                    rawText = rawText.replace(/\}\s*\{/g, '},{');

                    const data = JSON.parse(rawText);

                    // Parse logic based on MyHora/iCal structure
                    if (data.VCALENDAR && data.VCALENDAR[0] && data.VCALENDAR[0].VEVENT) {
                        const events = data.VCALENDAR[0].VEVENT;
                        let newHolidays = {};

                        events.forEach(ev => {
                            // Extract date: "20250101"
                            const dateRaw = ev["DTSTART;VALUE=DATE"];
                            const name = ev["SUMMARY"];

                            if (dateRaw && name) {
                                // Convert YYYYMMDD to YYYY-MM-DD
                                const y = dateRaw.substring(0, 4);
                                const m = dateRaw.substring(4, 6);
                                const d = dateRaw.substring(6, 8);
                                const dateFormatted = `${y}-${m}-${d}`;
                                newHolidays[dateFormatted] = name;
                            }
                        });

                        holidaysData = newHolidays;
                        localStorage.setItem('hybrid_holidays_cache', JSON.stringify(holidaysData));
                        holidayApiStatus = 'Success';
                    } else {
                        throw new Error('Invalid Data Structure');
                    }
                } else {
                    holidayApiStatus = 'Error';
                }
            } catch (error) {
                console.error("Holiday Fetch Error:", error);
                holidayApiStatus = 'Error';
            }
            renderEditor(document.getElementById('app-content'));
            if (currentView === 'calendar') renderCalendar(document.getElementById('app-content'));
        }

         * 4. ฟังก์ชันจัดการการแสดงผล (RENDER)

            document.getElementById('nav-' + view).classList.add('bg-white', 'shadow-sm', 'text-blue-600');
            document.getElementById('nav-' + view).classList.remove('text-slate-500');
            render();
        }

        function render() {
            const container = document.getElementById('app-content');
            container.innerHTML = ''; // Clear content

            if (currentView === 'dashboard') renderDashboard(container);
            else if (currentView === 'calendar') renderCalendar(container);
            else if (currentView === 'editor') renderEditor(container);
        }

        // --- DASHBOARD ---
        function renderDashboard(container) {

            targetDate.setDate(now.getDate() + previewOffset);

            const phase = scheduleData.find(p => p.days.includes(cDay));
            const isToday = previewOffset === 0;

            // Fix: บังคับแสดงปีเป็น ค.ศ. (u-ca-gregory)
            const targetLabel = targetDate.toLocaleDateString('th-TH-u-ca-gregory', { day: 'numeric', month: 'long', year: 'numeric' });

            let currentTask = null;
            if (phase) {
                const timeStr = now.getHours().toString().padStart(2, '0') + ':' + now.getMinutes().toString().padStart(2, '0');
                const sorted = [...phase.routine].sort((a, b) => a.start.localeCompare(b.start));

                // Find active task (only if isToday)
                if (isToday) {
                    for (let i = 0; i < sorted.length; i++) {
                        const item = sorted[i];
                        const isActive = (timeStr >= item.start && (timeStr < item.end || item.end < item.start)) ||
                            (item.end < item.start && timeStr < item.end);
                        if (isActive) {
                            currentTask = item;
                            break;
                        }
                    }
                    if (!currentTask && sorted.length > 0) currentTask = sorted[0]; // Fallback
                }
            }

                                <div>

                                    <div class="text-2xl md:text-3xl font-black text-slate-800 flex items-center justify-center md:justify-start gap-4">

                                    </div>
                                </div>
                                <div class="px-4 py-1.5 rounded-full inline-block text-[10px] font-black uppercase ${phase?.color || 'bg-slate-100'}">

                            <!-- Progress Visual -->

                                <div class="z-10 text-center">
                                    <span class="block text-6xl font-black text-slate-800 leading-none">${cDay}</span>
                                    <span class="text-[10px] font-black uppercase text-slate-400 mt-1 block">Cycle Day</span>
                                </div>
                            </div>
                        </div>
                    </div>

                    <!-- Sneak Peek & Routine List -->

        // --- CALENDAR ---
        function renderCalendar(container) {
            const year = calendarBaseDate.getFullYear();
            const month = calendarBaseDate.getMonth();
            const firstDay = new Date(year, month, 1).getDay();
            const totalDays = new Date(year, month + 1, 0).getDate();
            // Fix: บังคับแสดงปีเป็น ค.ศ. (u-ca-gregory)
            const monthLabel = calendarBaseDate.toLocaleDateString('th-TH-u-ca-gregory', { month: 'long', year: 'numeric' });

            let gridHTML = '';
            // Spacer for empty days before the 1st
            for (let i = 0; i < firstDay; i++) gridHTML += '<div class="aspect-square opacity-10"></div>';

            // List for Legend
            let currentMonthHolidays = [];

            for (let d = 1; d <= totalDays; d++) {
                // Correct Date Construction to avoid timezone shift
                // Use a string format YYYY-MM-DD
                const dStr = String(d).padStart(2, '0');
                const mStr = String(month + 1).padStart(2, '0');
                const isoKey = `${year}-${mStr}-${dStr}`;

                // Create Date Object for Cycle Calculation
                const dateObj = new Date(year, month, d);

                const cDay = getCycleDay(dateObj);
                const phase = scheduleData.find(p => p.days.includes(cDay));
                const isWeekend = dateObj.getDay() === 0 || dateObj.getDay() === 6;
                const holidayName = holidaysData[isoKey];

                // Check Types
                const isPerfectOff = phase?.type?.includes('off') && (isWeekend || holidayName);
                const isGhost = phase?.type?.includes('transition');
                const isToday = new Date().toISOString().split('T')[0] === isoKey;

                // Emoji Logic (Priority Chain)
                let emoji = '';
                if (isPerfectOff && holidayName) emoji = '💛'; // Gold Heart (Super Off)
                else if (isPerfectOff) emoji = '❤️';
                else if (isGhost && holidayName) emoji = '🌟'; // Gold Star/Ghost (Holiday Ghost)
                else if (isGhost) emoji = '👻';
                else if (holidayName) emoji = '✨'; // Just Holiday

                if (holidayName) {
                    currentMonthHolidays.push({ date: d, name: holidayName, icon: emoji });
                } else if (isPerfectOff) {
                    currentMonthHolidays.push({ date: d, name: 'Perfect OFF', icon: emoji });
                }

                // --- Responsive Logic ---
                // ใช้ CSS Class ใน <style> ด้านบนเพื่อจัดการการซ่อน/แสดง
                const hasEmojiClass = emoji ? 'has-emoji' : '';

                gridHTML += `
                    <div onclick="jumpToDate('${isoKey}')" 
                         class="aspect-square relative flex flex-col items-center justify-center rounded-2xl cursor-pointer transition-all hover:scale-105 active:scale-95 cell-content ${hasEmojiClass} ${isToday ? 'border-4' : 'border-2'}
                         ${phase?.color || 'bg-white border-slate-50'} 
                         ${isToday ? 'border-slate-800 z-10' : 'border-transparent opacity-95 hover:opacity-100'}

                        <!-- Date Number: Will be hidden on small screens if has-emoji -->
                        <span class="date-number text-sm font-black ${isWeekend ? 'text-rose-500' : 'text-slate-700'}">${d}</span>
                        
                        <span class="text-[8px] font-bold opacity-50 tracking-tighter">D${cDay}</span>
                        
                        <!-- EMOJI Area -->
                        <div class="emoji-wrapper flex flex-col gap-0.5">
                            ${emoji ? `<span class="drop-shadow-sm">${emoji}</span>` : ''}
                        </div>
                    </div>
                `;
            }

            // Legend HTML
            const holidayListHTML = currentMonthHolidays.length > 0
                ? `<div class="w-full mt-4 pt-4 border-t border-slate-100 grid grid-cols-1 md:grid-cols-2 gap-2">
                    ${currentMonthHolidays.map(h => `
                        <div class="flex items-center gap-2 text-xs text-slate-500">
                            <span class="font-bold text-yellow-500">${h.icon} ${h.date}</span>
                            <span>${h.name}</span>
                        </div>

                : '';

                    <div class="bg-white p-5 rounded-3xl shadow-sm border border-slate-100 flex items-center justify-between">
                        <button onclick="calendarBaseDate.setMonth(calendarBaseDate.getMonth()-1); render()" class="p-2 hover:bg-slate-50 rounded-xl transition-all"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="15 18 9 12 15 6"/></svg></button>
                        <h2 onclick="calendarBaseDate = new Date(); render()" class="text-lg font-black text-slate-800 uppercase tracking-tight cursor-pointer hover:text-blue-600 transition-colors">${monthLabel}</h2>
                        <button onclick="calendarBaseDate.setMonth(calendarBaseDate.getMonth()+1); render()" class="p-2 hover:bg-slate-50 rounded-xl transition-all"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="9 18 15 12 9 6"/></svg></button>
                    </div>
                    <div class="grid grid-cols-7 gap-2 md:gap-3">
                        ${['อา', 'จ', 'อ', 'พ', 'พฤ', 'ศ', 'ส'].map(d => `<div class="text-center text-[10px] font-black text-slate-400 py-1 uppercase tracking-widest">${d}</div>`).join('')}
                        ${gridHTML}
                    </div>
                    
                    <!-- Legend & Holidays -->
                    <div class="bg-white p-6 rounded-[2rem] border border-slate-100 flex flex-wrap items-center justify-center gap-6 shadow-sm">
                        <div class="flex flex-wrap justify-center gap-4 md:gap-8">
                            <div class="flex items-center gap-2"><span class="text-xl">👻</span> <span class="text-[9px] font-black text-slate-400 uppercase tracking-widest leading-none">Ghost Nap</span></div>
                            <div class="flex items-center gap-2"><span class="text-xl">🌟</span> <span class="text-[9px] font-black text-slate-400 uppercase tracking-widest leading-none">Golden Ghost</span></div>
                            <div class="flex items-center gap-2"><span class="text-xl">❤️</span> <span class="text-[9px] font-black text-slate-400 uppercase tracking-widest leading-none">Perfect OFF</span></div>
                            <div class="flex items-center gap-2"><span class="text-xl">💛</span> <span class="text-[9px] font-black text-slate-400 uppercase tracking-widest leading-none">Golden OFF</span></div>
                            <div class="flex items-center gap-2"><span class="text-xl">✨</span> <span class="text-[9px] font-black text-slate-400 uppercase tracking-widest leading-none">Holiday</span></div>
                        </div>
                        ${holidayListHTML}
                    </div>
                </div>
            `;
        }

                    </div>
                </div>
            `;
        }

        /**
         * 5. ฟังก์ชันสนับสนุนการทำงาน (SUPPORTING ACTIONS)
         */

        let clockInterval = null;
        function startClock() {
            if (clockInterval) clearInterval(clockInterval);
            const update = () => {
                const clockEl = document.getElementById('realtime-clock');
                if (clockEl) clockEl.innerText = new Date().toLocaleTimeString('th-TH', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
            };
            update();
            clockInterval = setInterval(update, 1000);
        }

        function saveData() {
            localStorage.setItem('hybrid_schedule_v1', JSON.stringify(scheduleData));
            localStorage.setItem('hybrid_start_date', startDateStr);
        }

        /**
         * ฟังก์ชัน: loadDefaultData
         * หน้าที่: โหลดและเขียนทับข้อมูลตารางงานและวันหยุดด้วยข้อมูลเริ่มต้น (Default)
         * ได้รับการเขียนโค้ดแบบยาว ทีละขั้นตอน และอธิบายด้วย Comment เพื่อให้คนที่มาอ่าน
         * สามารถรีวิว (Review) หรือนำไปดัดแปลงแก้ไข (Edit) ได้ง่ายและเข้าใจได้ชัดเจน
         */
        function loadDefaultData() {
            // ขั้นตอนที่ 1: รับการยืนยันจากผู้ใช้งาน ป้องกันกรณีที่เผลอกดปุ่มโดยไม่ตั้งใจ
            // หากเผลอกดอาจทำให้ข้อมูลการตั้งค่าปัจจุบันที่ทำไว้สูญหายได้
            const confirmMessage = "คุณต้องการโหลดข้อมูลเริ่มต้น (Load Default) ใช่หรือไม่?\nคำเตือน: ข้อมูลการตั้งค่าปัจจุบันของคุณจะถูกเขียนทับและไม่สามารถกู้คืนได้!";
            const userConfirmed = confirm(confirmMessage);

            // ขั้นตอนที่ 2: ตรวจสอบการตัดสินใจของผู้ใช้ ถ้ายกเลิก (Cancel) ให้ออกจากฟังก์ชันทันที (Early Return)
            if (userConfirmed === false) {
                return; // จบการทำงาน ไม่ทำคำสั่งด้านล่าง
            }

            // ขั้นตอนที่ 3: เตรียมข้อมูล Schedule เริ่มต้น
            // การใช้ JSON.stringify และตามด้วย JSON.parse เป็นเทคนิคที่เรียกว่า "Deep Copy"
            // ประโยชน์คือป้องกันไม่ให้ข้อมูลที่ถูกนำมาใช้งานไปแก้ไขตัวอ้างอิงของตัวแปรเริ่มต้น (DEFAULT_SCHEDULE)
            const scheduleAsString = JSON.stringify(DEFAULT_SCHEDULE);
            const freshScheduleDataObject = JSON.parse(scheduleAsString);

            // ขั้นตอนที่ 4: เตรียมข้อมูล Holidays (วันหยุด) เริ่มต้น ด้วยเทคนิค Deep Copy เช่นเดียวกัน
            const holidaysAsString = JSON.stringify(DEFAULT_HOLIDAYS);
            const freshHolidaysDataObject = JSON.parse(holidaysAsString);

            // ขั้นตอนที่ 5: นำข้อมูลใหม่ที่เพิ่งเตรียมเสร็จไปแทนที่ในตัวแปรสถานะหลัก (State Variables) ของระบบ
            scheduleData = freshScheduleDataObject;
            holidaysData = freshHolidaysDataObject;

            // ขั้นตอนที่ 6: บันทึกวันหยุด (Holidays) ลงใน Local Storage ของ Browser
            const holidaysToSave = JSON.stringify(holidaysData);
            localStorage.setItem('hybrid_holidays_cache', holidaysToSave);

            // ขั้นตอนที่ 7: อัปเดตข้อมูลการจัดตารางเวลา (Schedule) ลงใน Local Storage
            // ภายในฟังก์ชัน saveData() จะทำการเซฟ scheduleData ให้กับเราโดยอัตโนมัติ
            saveData();

            // ขั้นตอนที่ 8: รีเฟรชหน้าจอ (Re-render) เพื่อดึงข้อมูลสถานะล่าสุดไปวาด UI บนหน้าเว็บใหม่
            render();

            // ขั้นตอนที่ 9: แจ้งเตือนข้อความให้ผู้ใช้งานทราบว่ากระบวนการทุกอย่างเสร็จสมบูรณ์
            alert("โหลดข้อมูลเริ่มต้น (Default Data) เข้าสู่ระบบเรียบร้อยแล้ว!");
        }

        function updateStartDate(val) {
            startDateStr = val;
            saveData();
            render();
        }

        function goToDashboard() {
            previewOffset = 0;
            changeView('dashboard');
        }

        // --- แก้ไขบัค Calendar Jump (-1 Day) ---
        function jumpToDate(isoStr) {
            // isoStr Format: "YYYY-MM-DD"
            const parts = isoStr.split('-').map(Number); // [2024, 12, 5]
            // Note: Month in Date constructor is 0-indexed
            const target = new Date(parts[0], parts[1] - 1, parts[2]);
            const today = new Date();

            // Set both to midnight to count pure days
            target.setHours(0, 0, 0, 0);
            today.setHours(0, 0, 0, 0);

            // Calculate difference in milliseconds
            const diffTime = target.getTime() - today.getTime();
            // Use Round instead of Floor to avoid timezone/DST glitches
            const diffDays = Math.round(diffTime / (1000 * 60 * 60 * 24));

            previewOffset = diffDays;
            changeView('dashboard');
        }

        // Editor Functions
        function updatePhase(idx, field, val) { scheduleData[idx][field] = val; saveData(); }
        function updateRoutine(pIdx, rIdx, field, val) { scheduleData[pIdx].routine[rIdx][field] = val; saveData(); }
        function addActivity(pIdx) { scheduleData[pIdx].routine.push({ start: '09:00', end: '10:00', task: 'กิจกรรมใหม่', icon: 'Clock' }); saveData(); render(); }
        function removeActivity(pIdx, rIdx) { scheduleData[pIdx].routine.splice(rIdx, 1); saveData(); render(); }
        function addPhase() { scheduleData.push({ id: Date.now(), title: 'Phase ใหม่', days: [], accent: 'bg-blue-500', color: 'bg-blue-50', routine: [] }); saveData(); render(); }

        // Export/Import
        function exportData() {
            const exportObj = { schedule: scheduleData, holidays: holidaysData };
            const data = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(exportObj, null, 2));
            const a = document.createElement('a');
            a.href = data; a.download = "hybrid_engineer_data.json"; a.click();
        }

        function importData(e) {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = (ev) => {
                try {
                    const json = JSON.parse(ev.target.result);
                    // Support legacy or new format
                    if (json.schedule) {
                        scheduleData = json.schedule;
                        if (json.holidays) {
                            holidaysData = json.holidays;
                            localStorage.setItem('hybrid_holidays_cache', JSON.stringify(holidaysData));
                        }
                    } else {
                        scheduleData = json; // Legacy format
                    }
                    saveData();
                    changeView('dashboard');
                    alert('Import เรียบร้อย!');
                } catch (e) { alert('ไฟล์ไม่ถูกต้อง'); }
            };
            reader.readAsText(file);
        }

        // Attempt to auto-fetch holidays if cache is small (optional logic)
        if (Object.keys(holidaysData).length < 20) {
            fetchThaiHolidays();
        }

        // เริ่มต้นแอป
        render();

    </script>
</body>

</html>
